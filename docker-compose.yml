version: '3.9'

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:4000
    container_name: cafe_frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

  backend:
    build: ../platform-backend
    container_name: cafe_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/cafe_db
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "npm run migrate && npm run seed && npm start"

  postgres:
    image: postgres:16-alpine
    container_name: cafe_postgres
    environment:
      POSTGRES_DB: cafe_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
